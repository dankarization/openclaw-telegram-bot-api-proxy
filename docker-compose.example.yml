name: openclaw-telegram-bot-api

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?set TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: ${TELEGRAM_LOCAL:-1}
    ports:
      - "127.0.0.1:${BOT_API_PORT:-8081}:8081"
    volumes:
      - "${BOT_API_DATA_DIR:-./var/telegram-bot-api}:/var/lib/telegram-bot-api"
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
